<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Clip path to keep white stripes inside the blue circle -->
    <clipPath id="blue-circle-clip">
      <circle cx="82" cy="64" r="38"/>
    </clipPath>
  </defs>
  
  <!-- Orange crescent circle -->
  <circle cx="60" cy="64" r="42" fill="#F58220"/>
  
  <!-- Separation outline -->
  <circle cx="82" cy="64" r="39" fill="none" stroke="#0f0715" stroke-width="2"/>
  
  <!-- Blue circle -->
  <circle cx="82" cy="64" r="38" fill="#2C2255"/>
  
  <!-- White stripes inside blue circle -->
  <g clip-path="url(#blue-circle-clip)">
    <rect x="30" y="53" width="90" height="4.5" fill="#FFFFFF"/>
    <rect x="30" y="62" width="90" height="4.5" fill="#FFFFFF"/>
    <rect x="30" y="71" width="90" height="4.5" fill="#FFFFFF"/>
  </g>
</svg>